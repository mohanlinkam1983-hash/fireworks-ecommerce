<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Fireworks Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="text-2xl font-bold text-green-600">🎆 Fireworks Store</a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-gray-800 mb-8">Checkout</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Checkout Form -->
            <div class="lg:col-span-2">
                <form id="checkout-form" class="space-y-8">
                    <!-- Customer Details -->
                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6">Delivery Details</h2>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-gray-700 font-bold mb-2">Full Name *</label>
                                <input type="text" id="customer-name" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Enter your name">
                            </div>
                            <div>
                                <label class="block text-gray-700 font-bold mb-2">Mobile Number *</label>
                                <input type="tel" id="customer-mobile" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="10-digit mobile number">
                            </div>
                            <div>
                                <label class="block text-gray-700 font-bold mb-2">WhatsApp Number</label>
                                <input type="tel" id="customer-whatsapp" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="Optional">
                            </div>
                            <div>
                                <label class="block text-gray-700 font-bold mb-2">Email *</label>
                                <input type="email" id="customer-email" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="your@email.com">
                            </div>
                            <div>
                                <label class="block text-gray-700 font-bold mb-2">City *</label>
                                <input type="text" id="customer-city" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="City name">
                            </div>
                            <div>
                                <label class="block text-gray-700 font-bold mb-2">State *</label>
                                <input type="text" id="customer-state" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="State name">
                            </div>
                            <div>
                                <label class="block text-gray-700 font-bold mb-2">Pincode *</label>
                                <input type="text" id="customer-pincode" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" placeholder="6-digit pincode">
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <label class="block text-gray-700 font-bold mb-2">Full Address *</label>
                            <textarea id="customer-address" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" rows="3" placeholder="Enter complete address"></textarea>
                        </div>
                    </div>

                    <!-- Special Instructions -->
                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6">Special Instructions</h2>
                        <textarea id="special-instructions" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" rows="3" placeholder="Any special instructions for delivery..."></textarea>
                    </div>

                    <!-- Order Items Review -->
                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <h2 class="text-2xl font-bold text-gray-800 mb-6">Order Review</h2>
                        <div id="order-review" class="space-y-4">
                            <!-- Items will be loaded here -->
                        </div>
                    </div>

                    <!-- Terms and Submit -->
                    <div class="bg-white rounded-lg shadow-lg p-6">
                        <label class="flex items-center mb-6">
                            <input type="checkbox" id="terms-agree" required class="w-5 h-5 text-green-600 rounded focus:ring-2 focus:ring-green-500">
                            <span class="ml-3 text-gray-700">I agree to the terms and conditions</span>
                        </label>
                        
                        <button type="submit" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">
                            Submit Order
                        </button>
                    </div>
                </form>
            </div>

            <!-- Order Summary Sidebar -->
            <div>
                <div class="bg-white rounded-lg shadow-lg p-6 sticky top-24">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Order Summary</h2>
                    
                    <div class="space-y-4 mb-6">
                        <div class="flex justify-between text-gray-700">
                            <span>Subtotal:</span>
                            <span id="checkout-subtotal">Rs. 0</span>
                        </div>
                        <div class="flex justify-between text-gray-700">
                            <span>Discount:</span>
                            <span id="checkout-discount">Rs. 0</span>
                        </div>
                        <div class="flex justify-between text-gray-700">
                            <span>Delivery:</span>
                            <span id="checkout-delivery">Rs. 0</span>
                        </div>
                        <div class="border-t pt-4 flex justify-between text-xl font-bold text-green-600">
                            <span>Grand Total:</span>
                            <span id="checkout-grand-total">Rs. 0</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/checkout.js"></script>
</body>
</html>
