<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation - Fireworks Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="text-2xl font-bold text-green-600">🎆 Fireworks Store</a>
            </div>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto px-4 py-8">
        <div class="bg-white rounded-lg shadow-2xl p-12 text-center">
            <div class="text-6xl mb-6">✅</div>
            <h1 class="text-4xl font-bold text-green-600 mb-4">Thank You!</h1>
            <p class="text-xl text-gray-700 mb-8">Your order has been placed successfully</p>
            
            <div class="bg-gray-100 rounded-lg p-6 mb-8 text-left">
                <div class="mb-4">
                    <label class="block text-gray-600 font-bold">Order ID</label>
                    <p class="text-2xl font-bold text-green-600" id="order-id-display">SM202600001</p>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-600 font-bold">Customer Name</label>
                    <p class="text-lg" id="customer-name-display">-</p>
                </div>
                <div class="mb-4">
                    <label class="block text-gray-600 font-bold">Order Total</label>
                    <p class="text-2xl font-bold text-green-600" id="order-total-display">Rs. 0</p>
                </div>
                <div>
                    <label class="block text-gray-600 font-bold">Order Date</label>
                    <p class="text-lg" id="order-date-display">-</p>
                </div>
            </div>

            <div class="space-y-4">
                <button onclick="downloadPDF()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">
                    📥 Download PDF Invoice
                </button>
                <button onclick="printOrder()" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition">
                    🖨️ Print Invoice
                </button>
                <a href="/" class="block bg-gray-600 text-white font-bold py-3 rounded-lg hover:bg-gray-700 transition text-center">
                    🏠 Back to Home
                </a>
            </div>

            <div class="mt-8 text-gray-600">
                <p class="mb-2">Your order details have been sent to your email address.</p>
                <p>You can track your order status anytime from your email.</p>
            </div>
        </div>
    </div>

    <script src="/js/order-confirmation.js"></script>
</body>
</html>
