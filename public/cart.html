<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Fireworks Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-lg sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="/" class="text-2xl font-bold text-green-600">🎆 Fireworks Store</a>
                <a href="/" class="text-gray-600 hover:text-green-600">← Back to Shopping</a>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 py-8">
        <h1 class="text-4xl font-bold text-gray-800 mb-8">Shopping Cart</h1>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Cart Items -->
            <div class="lg:col-span-2">
                <div id="cart-items" class="bg-white rounded-lg shadow-lg p-6">
                    <!-- Cart items will be loaded here -->
                </div>
            </div>

            <!-- Cart Summary -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-lg shadow-lg p-6 sticky top-24">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Order Summary</h2>
                    
                    <div class="space-y-4 mb-6">
                        <div class="flex justify-between text-gray-700">
                            <span>Subtotal:</span>
                            <span id="subtotal">Rs. 0</span>
                        </div>
                        <div class="flex justify-between text-gray-700">
                            <span>Discount:</span>
                            <span id="discount-amount">Rs. 0</span>
                        </div>
                        <div class="flex justify-between text-gray-700">
                            <span>Delivery:</span>
                            <span id="delivery-amount">Rs. 0</span>
                        </div>
                        <div class="border-t pt-4 flex justify-between text-xl font-bold text-green-600">
                            <span>Grand Total:</span>
                            <span id="grand-total">Rs. 0</span>
                        </div>
                    </div>

                    <button onclick="goToCheckout()" class="w-full bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition">
                        Proceed to Checkout
                    </button>
                    <button onclick="continueShopping()" class="w-full mt-3 bg-gray-300 text-gray-800 font-bold py-3 rounded-lg hover:bg-gray-400 transition">
                        Continue Shopping
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/cart.js"></script>
</body>
</html>
